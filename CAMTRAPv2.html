<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C3 Multi-Controller</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
    .card { background: #1e293b; padding: 20px; border-radius: 16px; max-width: 400px; margin: auto; border: 1px solid #334155; }
    .btn { display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; text-decoration: none; font-size: 1.1rem; transition: 0.2s; }
    .btn-wake { background: #10b981; color: white; }
    .btn-wake:active { transform: scale(0.98); background: #059669; }
    .btn-pair { background: transparent; border: 2px dashed #475569; color: #94a3b8; margin-top: 20px; }
    .btn-android { background: #3b82f6; color: white; font-size: 0.9rem; }
    #log { margin-top: 20px; text-align: left; white-space: pre-line; border: 1px solid #334155; padding: 12px; background: #020617; height: 100px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #94a3b8; border-radius: 8px; }
    .step-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 12px; border: 2px solid #ffc107; margin-bottom: 20px; text-align: left; }
    .ssid-name { display: block; font-size: 22px; font-weight: bold; color: #d9534f; text-align: center; margin: 10px 0; border: 2px dashed #d9534f; padding: 5px; background: #fff; }
  </style>
</head>
<body>

  <div class="card">
    <h2>C3 Controller <small style="color:#3b82f6">v3.8</small></h2>
    
    <div id="device-list">
      </div>

    <button class="btn btn-pair" onclick="pairNewBoard()">+ Pair New Board</button>

    <div id="setup-guide" style="display:none;">
      <div class="step-box">
        <strong style="font-size: 1.1rem;">STEP 1: Connect Wi-Fi</strong>
        <p>Switch your phone to this network:</p>
        <span class="ssid-name">CamTrap-...</span>
        
        <a href="intent:#Intent;action=android.settings.WIFI_SETTINGS;end" class="btn btn-android">📶 Open Android Wi-Fi List</a>
      </div>
      <a href="http://192.168.4.1" class="btn" style="background:#6366f1; color:white;">STEP 2: Open Camera</a>
      <button class="btn" style="background:#475569; color:white; font-size: 0.8rem;" onclick="location.reload()">↺ Back to Boards</button>
    </div>

    <div id="log">Checking for paired boards...</div>
  </div>

  <script>
    const S_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
    const C_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";
    const logEl = document.getElementById('log');

    function log(msg) {
      logEl.textContent += `> ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    // LOAD SAVED DEVICES FROM BROWSER PERMISSIONS
    window.onload = async () => {
      if (navigator.bluetooth && navigator.bluetooth.getDevices) {
        try {
          const devices = await navigator.bluetooth.getDevices();
          const list = document.getElementById('device-list');
          
          devices.forEach((device, index) => {
            const b = document.createElement('button');
            b.className = "btn btn-wake";
            // Even if names are identical, we label them by order
            b.innerText = `Wake Board #${index + 1} (${device.name})`;
            b.onclick = () => wakeBoard(device);
            list.appendChild(b);
          });
          
          if(devices.length === 0) {
            log("No boards paired yet. Click '+ Pair' to start.");
          } else {
            log(`Loaded ${devices.length} boards from memory.`);
          }
        } catch (e) {
          log("⚠️ Permission error. Check Chrome Flags.");
        }
      } else {
        log("❌ Web Bluetooth not supported.");
      }
    };

    async function pairNewBoard() {
      try {
        log("Opening selection list...");
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'C3_WAKE' }], // Looking for your exact standard name
          optionalServices: [S_UUID]
        });
        log("Successfully paired " + device.name);
        location.reload(); // Refresh to update the board list
      } catch (e) {
        log("Pairing cancelled.");
      }
    }

    async function wakeBoard(device) {
      try {
        log("Connecting to specific board ID...");
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(S_UUID);
        const char = await service.getCharacteristic(C_UUID);
        
        log("Sending Wake Signal (0x01)...");
        await char.writeValue(new Uint8Array([0x01]));
        
        log("✅ Wake Delivered!");
        
        // Hide list and show the Wi-Fi/IP instructions
        document.getElementById('device-list').style.display = 'none';
        document.querySelector('.btn-pair').style.display = 'none';
        document.getElementById('setup-guide').style.display = 'block';
        
      } catch (err) {
        log("❌ Connection failed. Board may be out of range or off.");
        console.error(err);
      }
    }
  </script>
</body>
</html>
