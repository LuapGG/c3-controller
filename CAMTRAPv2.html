<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C3 Multi-Wake</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; text-align: center; }
    #log { margin-top: 20px; text-align: left; white-space: pre-line; border: 1px solid #ccc; padding: 15px; background: #fff; height: 100px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #666; }
    .warning { color: #d9534f; font-weight: bold; background: #fff3f3; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; border: 1px solid #d9534f; }
    
    /* Button Styles from your working code */
    .btn-main { padding: 20px 30px; font-size: 18px; background-color: #28a745; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 100%; margin-bottom: 10px; display: block;}
    .btn-android { background-color: #007bff; text-decoration: none; display: block; padding: 15px; color: white; border-radius: 10px; font-weight: bold; margin: 15px 0; }
    
    #setup-guide { display: none; margin-top: 10px; text-align: left; }
    .step-1-box { background-color: #fff3cd; border: 3px solid #ffc107; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
    .ssid-name { font-size: 24px; color: #d9534f; font-weight: bold; display: block; margin: 10px 0; border: 2px dashed #d9534f; padding: 10px; text-align: center; background: #fff; }
    .esp-link { display: block; padding: 18px; background-color: #ffffff; color: #007bff; text-decoration: none; border: 2px solid #007bff; border-radius: 10px; font-weight: bold; text-align: center; font-size: 18px; }
  </style>
</head>
<body>
  <h1>C3 Multi-Controller</h1>
  
  <div id="browser-err" class="warning">
    ⚠️ Browser Not Supported!<br>
    Please open in <b>Chrome</b> (Android) or <b>Bluefy</b> (iOS).
  </div>
  
  <div id="controls">
    <div id="device-list"></div>
    <button id="btnPair" class="btn-main" style="background-color: #6c757d;">+ PAIR NEW BOARD</button>
  </div>

  <div id="setup-guide">
    <div class="step-1-box">
        <b>STEP 1: Connect Wi-Fi</b>
        <span class="ssid-name">CamTrap-...</span>
        
        <a href="intent:#Intent;action=android.settings.WIFI_SETTINGS;end" class="btn-android">📶 OPEN WIFI SETTINGS</a>
        
        <p style="margin: 0; font-size: 14px; color: #856404;">⚠️ Switch to CamTrap network, then return here.</p>
    </div>

    <div class="step-2-box">
        <a href="http://192.168.4.1" class="esp-link">STEP 2: OPEN CAMERA (192.168.4.1)</a>
    </div>
  </div>

  <div id="log">Checking browser...</div>

  <script>
    const SERVICE_UUID        = '0000ffe0-0000-1000-8000-00805f9b34fb';
    const CHARACTERISTIC_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';

    const logEl = document.getElementById('log');
    const controls = document.getElementById('controls');
    const setupGuide = document.getElementById('setup-guide');
    const btnPair = document.getElementById('btnPair');
    const deviceList = document.getElementById('device-list');
    const browserErr = document.getElementById('browser-err');

    function log(msg) {
      logEl.textContent += `> ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    // LOAD REMEMBERED BOARDS
    window.onload = async () => {
      if (!navigator.bluetooth) {
        log("❌ Web Bluetooth not supported.");
        browserErr.style.display = 'block';
      } else if (navigator.bluetooth.getDevices) {
        const devices = await navigator.bluetooth.getDevices();
        devices.forEach((device, index) => {
          const b = document.createElement('button');
          b.className = "btn-main";
          b.innerText = `WAKE BOARD #${index + 1}`;
          b.onclick = () => connectAndWake(device);
          deviceList.appendChild(b);
        });
        log(`Ready. Loaded ${devices.length} boards.`);
      }
    };

    // PAIR NEW BOARD LOGIC (Exactly like your original)
    btnPair.addEventListener('click', async () => {
      try {
        log("Searching...");
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'C3_WAKE' }],
          optionalServices: [SERVICE_UUID]
        });
        connectAndWake(device);
      } catch (error) { log("❌ " + error); }
    });

    async function connectAndWake(device) {
      try {
        log("Connecting to " + device.name + "...");
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        log("Sending 0x01...");
        await characteristic.writeValue(new Uint8Array([0x01]));

        log("✅ Wake Sent!");
        controls.style.display = 'none';
        setupGuide.style.display = 'block';
      } catch (error) {
        log("❌ ERROR: " + error);
      }
    }
  </script>
</body>
</html>
